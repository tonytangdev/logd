<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 44" fill="none">
  <defs>
    <linearGradient id="cardFront" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#3d5240"/>
      <stop offset="100%" stop-color="#2a3629"/>
    </linearGradient>
    <linearGradient id="cardMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a6650"/>
      <stop offset="100%" stop-color="#3d5240"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b5e6a3"/>
      <stop offset="100%" stop-color="#9ece6a"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#1a2a1a" flood-opacity="0.2"/>
    </filter>
    <filter id="checkGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Decision stack — three stacked cards -->
  <g filter="url(#cardShadow)">
    <!-- Back card -->
    <rect x="10" y="11" width="24" height="28" rx="4" fill="#a3b8a0" opacity="0.35"/>
    <!-- Middle card -->
    <rect x="6" y="7" width="24" height="28" rx="4" fill="url(#cardMid)" opacity="0.6"/>
    <!-- Front card -->
    <rect x="2" y="3" width="24" height="28" rx="4" fill="url(#cardFront)"/>
    <!-- Subtle top highlight on front card -->
    <rect x="2" y="3" width="24" height="14" rx="4" fill="#fff" opacity="0.06"/>
  </g>

  <!-- Checkmark — the decision -->
  <path d="M9.5 16 L12.5 19.5 L20 12" stroke="url(#checkGrad)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#checkGlow)"/>

  <!-- Two subtle content lines -->
  <rect x="9" y="23" width="13" height="1.5" rx="0.75" fill="#a3b8a0" opacity="0.5"/>
  <rect x="9" y="26.5" width="8" height="1.5" rx="0.75" fill="#a3b8a0" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="42" y="28" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="24" font-weight="700" fill="#2d3b2d" letter-spacing="-1">log<tspan fill="#6b8f71">d</tspan></text>
</svg>
