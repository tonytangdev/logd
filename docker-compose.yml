services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: logd
      POSTGRES_PASSWORD: logd
      POSTGRES_DB: logd
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logd"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build: .
    ports:
      - "${LOGD_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://logd:logd@postgres:5432/logd
      LOGD_API_TOKEN: ${LOGD_API_TOKEN}
      LOGD_OLLAMA_URL: ${LOGD_OLLAMA_URL:-http://ollama:11434}
      LOGD_MODEL: ${LOGD_MODEL:-qwen3-embedding:0.6b}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    profiles: ["full"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  pgdata:
  ollama-data:
